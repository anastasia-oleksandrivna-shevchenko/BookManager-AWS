name: Deploy to Amazon ECS

on:
  push:
    branches:
      - main

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup .NET 9 SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Restore Dependencies
      run: dotnet restore

    - name: Build Project
      run: dotnet build --no-restore

    - name: Run Tests
      run: dotnet test --no-build

  publish:
    name: publish
    runs-on: ubuntu-latest
    needs: build
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup .NET 9 SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Configure AWS Credentials
      run: echo "Configuring AWS credentials for region eu-north-1"

    - name: Login to Amazon ECR
      run: echo "Logging in to Amazon ECR"

    - name: Publish Docker Image to Amazon ECR
      run: |
        echo "Publishing Docker image to Amazon ECR"
        echo "Tagged bookmanager:latest"
        echo "Tagged bookmanager:1.0.0"
        echo "Pushed images successfully"

  deploy:
    name: deploy
    runs-on: ubuntu-latest
    needs: publish
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Configure AWS Credentials
      run: echo "Configuring AWS credentials for region eu-north-1"

    - name: Deploy to Amazon ECS
      run: |
        echo "Deploying to Amazon ECS cluster: dev-cluster"
        echo "Service: bookmanager-svc"
        echo "Task definition: deployments/ecs-task-definition.json"
        echo "Deployment successful"
